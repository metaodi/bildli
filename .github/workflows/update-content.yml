name: Update Content

on:
  workflow_dispatch:
    inputs:
      competition:
        description: "Competition to update"
        required: true
        default: "All"
        type: choice
        options:
          - All
          - WC
          - PL
          - BL1
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  update-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync markdown content
        run: npm run sync:content
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          COMPETITION_FILTER: ${{ github.event.inputs.competition || 'All' }}

      - name: Commit updated markdown content
        run: |
          if git diff --quiet -- content package-lock.json package.json; then
            echo "No content changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content package-lock.json package.json
          git commit -m "Update markdown content"
          git push
